name: CD - 프로덕션 배포

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: ghcr.io/jaewon0806/dashboard-frontend

jobs:
  build-and-push:
    name: Docker 이미지 빌드 & GHCR push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 이미지 태그 메타데이터 생성
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      # Dockerfile: React Vite 빌드 → Nginx 이미지 (단일 컨테이너)
      # Nginx가 정적 파일 서빙 + GitLab/Redmine API 리버스 프록시를 모두 담당
      - name: 프론트엔드 이미지 빌드 & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.version }}
          # 빌드 시점 환경변수 (Vite가 번들에 포함)
          build-args: |
            VITE_GITLAB_URL=${{ secrets.VITE_GITLAB_URL }}
            VITE_REDMINE_URL=${{ secrets.VITE_REDMINE_URL }}
            VITE_CLAUDE_MODEL=${{ secrets.VITE_CLAUDE_MODEL }}

  deploy:
    name: 프로덕션 서버 배포
    runs-on: ubuntu-latest
    needs: build-and-push
    # Lightsail SSH 시크릿이 설정된 경우에만 실행
    if: ${{ secrets.LIGHTSAIL_HOST != '' }}

    steps:
      - name: SSH 배포
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          timeout: 60s
          command_timeout: 10m
          script: |
            cd /opt/app
            # 최신 docker-compose.prod.yml 다운로드
            sudo curl -fsSL \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose.prod.yml \
              -o docker-compose.prod.yml
            # GHCR 로그인 + 이미지 pull + 컨테이너 재시작
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            # 미사용 이미지 정리
            docker image prune -f
