name: CI - PR 체크

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  lint-and-typecheck:
    name: ESLint + TypeScript 타입 체크
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 20 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 의존성 설치
        run: npm ci

      - name: ESLint 실행
        run: npm run lint

      - name: TypeScript 타입 체크
        run: npm run typecheck

  build:
    name: Vite 프로덕션 빌드 검증
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 20 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 의존성 설치
        run: npm ci

      - name: 프로덕션 빌드
        run: npm run build
        env:
          # CI 환경용 더미 값 (빌드 성공 여부만 검증)
          VITE_GITLAB_URL: https://gitlab.example.com
          VITE_GITLAB_TOKEN: ci-dummy-token
          VITE_REDMINE_URL: https://redmine.example.com
          VITE_REDMINE_API_KEY: ci-dummy-key
          VITE_ANTHROPIC_API_KEY: ci-dummy-key
          VITE_CLAUDE_MODEL: claude-haiku-4-5
          VITE_DEFAULT_REFRESH_INTERVAL: "900"

  docker-build:
    name: Docker 이미지 빌드 테스트
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Docker 이미지 빌드 (Nginx + React 빌드 포함)
        run: docker build -t dashboard-frontend:ci-test .
        env:
          VITE_GITLAB_URL: https://gitlab.example.com
          VITE_GITLAB_TOKEN: ci-dummy-token
          VITE_REDMINE_URL: https://redmine.example.com
          VITE_REDMINE_API_KEY: ci-dummy-key
          VITE_ANTHROPIC_API_KEY: ci-dummy-key
          VITE_CLAUDE_MODEL: claude-haiku-4-5
