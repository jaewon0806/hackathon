name: CI - PR 체크

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  lint-and-typecheck:
    name: ESLint + TypeScript 타입 체크
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 20 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 의존성 설치
        run: npm ci

      - name: ESLint 실행
        run: npm run lint

      - name: TypeScript 타입 체크
        run: npm run typecheck

  test:
    name: Vitest 단위 테스트
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 20 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 의존성 설치
        run: npm ci

      - name: 단위 테스트 + 커버리지 측정
        run: npm run test:coverage
        env:
          VITE_GITLAB_URL: https://gitlab.example.com
          VITE_REDMINE_URL: https://redmine.example.com
          VITE_ANTHROPIC_API_KEY: test-key
          VITE_CLAUDE_MODEL: claude-haiku-4-5
          VITE_DEMO_MODE: "false"

      - name: 커버리지 리포트 업로드
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  build:
    name: Vite 프로덕션 빌드 검증
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 20 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 의존성 설치
        run: npm ci

      - name: 프로덕션 빌드
        run: npm run build
        env:
          # CI 환경용 더미 값 (빌드 성공 여부만 검증)
          VITE_GITLAB_URL: https://gitlab.example.com
          VITE_GITLAB_TOKEN: ci-dummy-token
          VITE_REDMINE_URL: https://redmine.example.com
          VITE_REDMINE_API_KEY: ci-dummy-key
          VITE_ANTHROPIC_API_KEY: ci-dummy-key
          VITE_CLAUDE_MODEL: claude-haiku-4-5
          VITE_DEFAULT_REFRESH_INTERVAL: "900"

  e2e:
    name: Playwright E2E 테스트 (데모 모드)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 20 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 의존성 설치
        run: npm ci

      - name: Playwright 브라우저 설치
        run: npx playwright install --with-deps chromium

      - name: E2E 테스트 실행 (데모 모드)
        run: npm run test:e2e
        env:
          VITE_DEMO_MODE: "true"
          VITE_GITLAB_URL: https://demo.example.com
          VITE_REDMINE_URL: https://demo.example.com
          VITE_ANTHROPIC_API_KEY: demo-key
          VITE_CLAUDE_MODEL: claude-haiku-4-5

      - name: Playwright 리포트 업로드
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  docker-build:
    name: Docker 이미지 빌드 검증
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: Docker 이미지 빌드 (push 없음)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: dashboard:ci
          build-args: |
            VITE_GITLAB_URL=https://demo.example.com
            VITE_REDMINE_URL=https://demo.example.com
          cache-from: type=gha
          cache-to: type=gha,mode=max
